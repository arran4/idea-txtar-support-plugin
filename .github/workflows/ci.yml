# Agent rules for generation:
# https://arran4.com/post/2026/006-Github-CI-and-Deploy/
# Built using this post as a reference/guide.
name: CI/CD

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
      - 'v*.*.*'
      - 'v*.*.*-rc*'
      - 'v*.*.*-beta*'
      - 'test-*'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: "lint-fix"
        type: choice
        options:
          - lint-fix
          - build
          - release-major
          - release-minor
          - release-patch
          - release-test
          - release-rc
          - release-alpha
          - monthly-maintenance
      release_version_override:
        description: "Optional explicit release version (for example 2.4.0 or 2.4.0-rc.2)"
        required: false
        default: ""
        type: string
      allow_prs:
        description: "Allow automation to open pull requests"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '17 3 1 * *'
    - cron: '41 2 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  discussions: write
  pull-requests: write
  checks: write
  packages: write
  security-events: write

jobs:
  route:
    name: Route event
    runs-on: ubuntu-latest
    outputs:
      run_code_checks: ${{ steps.route.outputs.run_code_checks }}
      run_pr_meta_checks: ${{ steps.route.outputs.run_pr_meta_checks }}
      run_cleanup: ${{ steps.route.outputs.run_cleanup }}
      run_release: ${{ steps.route.outputs.run_release }}
      is_monthly: ${{ steps.route.outputs.is_monthly }}
      is_nightly: ${{ steps.route.outputs.is_nightly }}
    steps:
      - id: route
        shell: bash
        run: |
          set -euo pipefail

          run_code_checks=false
          run_pr_meta_checks=false
          run_cleanup=false
          run_release=false
          is_monthly=false
          is_nightly=false

          case "${{ github.event_name }}" in
            push)
              run_code_checks=true
              ;;
            pull_request)
              if [[ "${{ github.event.action }}" == "closed" ]]; then
                run_cleanup=true
              else
                run_pr_meta_checks=true
                run_code_checks=true
              fi
              ;;
            release)
              run_release=true
              ;;
            workflow_dispatch)
              run_code_checks=true
              if [[ "${{ inputs.mode }}" == release-* ]]; then
                run_release=true
              fi
              if [[ "${{ inputs.mode }}" == "monthly-maintenance" ]]; then
                is_monthly=true
              fi
              if [[ "${{ inputs.mode }}" == "lint-fix" ]]; then
                is_nightly=true
              fi
              ;;
            schedule)
              run_code_checks=true
              if [[ "${{ github.event.schedule }}" == "17 3 1 * *" ]]; then
                is_monthly=true
              fi
              if [[ "${{ github.event.schedule }}" == "41 2 * * *" ]]; then
                is_nightly=true
              fi
              ;;
          esac

          echo "run_code_checks=$run_code_checks" >> "$GITHUB_OUTPUT"
          echo "run_pr_meta_checks=$run_pr_meta_checks" >> "$GITHUB_OUTPUT"
          echo "run_cleanup=$run_cleanup" >> "$GITHUB_OUTPUT"
          echo "run_release=$run_release" >> "$GITHUB_OUTPUT"
          echo "is_monthly=$is_monthly" >> "$GITHUB_OUTPUT"
          echo "is_nightly=$is_nightly" >> "$GITHUB_OUTPUT"

  discover:
    name: Discover capabilities and cost profile
    needs: route
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.profile.outputs.profile }}
      has_java: ${{ steps.detect.outputs.has_java }}
    steps:
      - uses: actions/checkout@v4

      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          echo "has_java=true" >> "$GITHUB_OUTPUT"

      - id: profile
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event.repository.private }}" == "true" ]]; then
            echo "profile=private" >> "$GITHUB_OUTPUT"
          else
            echo "profile=public" >> "$GITHUB_OUTPUT"
          fi

  prepare-release-tag:
    name: Prepare release tag
    needs: [route]
    if: ${{ (github.event_name == 'workflow_dispatch' && startsWith(inputs.mode, 'release-')) || github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) }}
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      next_version: ${{ steps.tag.outputs.next_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup git-tag-inc
        uses: arran4/git-tag-inc-action@v1
        with:
          mode: install
      - id: tag
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          MODE="${{ inputs.mode }}"
          OVERRIDE="${{ inputs.release_version_override }}"

          if [[ -n "$OVERRIDE" ]]; then
            OVERRIDE="${OVERRIDE#v}"
            next_tag="v$OVERRIDE"
          else
            case "$MODE" in
              release-major) level="major"; suffix="" ;;
              release-minor) level="minor"; suffix="" ;;
              release-patch) level="patch"; suffix="" ;;
              release-test)  level="patch"; suffix="test" ;;
              release-rc)    level="patch"; suffix="rc" ;;
              release-alpha) level="patch"; suffix="alpha" ;;
              *) echo "Unsupported release mode: $MODE"; exit 1 ;;
            esac
            if command -v git-tag-inc >/dev/null 2>&1; then
              level="${level#-}"
              args=(-print-version-only "$level")
              [[ -n "$suffix" ]] && args+=("$suffix")
              next_tag=$(git-tag-inc "${args[@]}")
            else
              git fetch --tags --force
              latest=$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -n 1)
              [[ -z "$latest" ]] && latest='0.0.0'

              if command -v npx >/dev/null 2>&1; then
                case "$level" in
                  major) bumped=$(npx --yes semver "$latest" -i major) ;;
                  minor) bumped=$(npx --yes semver "$latest" -i minor) ;;
                  *) bumped=$(npx --yes semver "$latest" -i patch) ;;
                esac
                next_tag="v${bumped}"
              else
                base="${latest%%-*}"
                IFS='.' read -r maj min pat <<< "$base"
                case "$level" in
                  major) maj=$((maj+1)); min=0; pat=0 ;;
                  minor) min=$((min+1)); pat=0 ;;
                  *) pat=$((pat+1)) ;;
                esac
                next_tag="v${maj}.${min}.${pat}"
              fi

              if [[ -n "$suffix" ]]; then
                next_tag="${next_tag}-${suffix}.1"
              fi
            fi
          fi

          [[ "$next_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]] || {
            echo "Invalid tag format: $next_tag" >&2
            exit 1
          }
          git fetch --tags --force
          if git rev-parse "$next_tag" >/dev/null 2>&1; then
            echo "Tag already exists: $next_tag" >&2
            echo "Choose a new mode or set release_version_override." >&2
            exit 1
          fi

          echo "release_tag=$next_tag" >> "$GITHUB_OUTPUT"
          clean_tag="${next_tag#v}"; clean_tag="${clean_tag%%-*}"
          IFS='.' read -r maj min pat <<< "$clean_tag"
          echo "next_version=${maj:-0}.${min:-0}.$(( ${pat:-0} + 1 ))-next" >> "$GITHUB_OUTPUT"

  gradle-build-test:
    name: Gradle build/test
    needs: [route, discover]
    if: ${{ needs.route.outputs.run_code_checks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew buildPlugin verifyPlugin test

  gradle-publish:
    name: Gradle publishPlugin
    if: ${{ always() && needs.route.outputs.run_release == 'true' && needs.gradle-build-test.result == 'success' }}
    needs: [route, discover, gradle-build-test, prepare-release-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4
      - name: Tag commit for release (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' && startsWith(inputs.mode, 'release-') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.prepare-release-tag.outputs.release_tag }}
          git push origin ${{ needs.prepare-release-tag.outputs.release_tag }}
      - name: Decode signing materials
        shell: bash
        run: |
          echo "${{ secrets.JB_CERTIFICATE_CHAIN_B64 }}" | base64 -d > /tmp/chain.crt
          echo "${{ secrets.JB_PRIVATE_KEY_B64 }}" | base64 -d > /tmp/private.pem
          chmod 600 /tmp/private.pem /tmp/chain.crt
          ls -lh /tmp/private.pem /tmp/chain.crt
      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.JB_PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: /tmp/chain.crt
          PRIVATE_KEY: /tmp/private.pem
          # The publish plugin task relies on GITHUB_REF_NAME by default.
          # We need to simulate it for manual releases or just use it.
          GITHUB_REF_NAME: ${{ needs.prepare-release-tag.outputs.release_tag || github.ref_name }}
        run: ./gradlew publishPlugin

  manual-gh-release:
    name: Manual release creation
    needs: [prepare-release-tag, gradle-publish]
    if: ${{ always() && github.event_name == 'workflow_dispatch' && startsWith(inputs.mode, 'release-') && needs.gradle-publish.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release with generated notes + discussion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release-tag.outputs.release_tag }}
        run: |
          set -euo pipefail
          prerelease=""
          case "${{ inputs.mode }}" in
            release-test|release-rc|release-alpha) prerelease="--prerelease" ;;
          esac

          discussion_arg="--discussion-category Announcements"

          if [[ -n "$prerelease" ]]; then
            gh release create "$TAG" --generate-notes $prerelease || true
          else
            gh release create "$TAG" --generate-notes $discussion_arg || \
              gh release create "$TAG" --generate-notes
          fi

  prepare-next-version-pr:
    name: Prepare next development iteration PR
    needs: [gradle-publish, prepare-release-tag]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' && (startsWith(inputs.mode, 'release-') || inputs.mode == 'release-test')) && needs.gradle-publish.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump to next version and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NEXT_VERSION="${{ needs.prepare-release-tag.outputs.next_version || '' }}"
          [[ -z "$NEXT_VERSION" ]] && { echo "No next version calculated; skipping."; exit 0; }

          BRANCH="bump-version-$NEXT_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Use sed to bump pluginVersion in gradle.properties
          sed -i "s/^pluginVersion=.*/pluginVersion=$NEXT_VERSION/" gradle.properties

          # Bump version in plugin.xml if present
          if grep -q "<version>" src/main/resources/META-INF/plugin.xml; then
            sed -i "s/<version>.*<\/version>/<version>$NEXT_VERSION<\/version>/" src/main/resources/META-INF/plugin.xml
          fi

          echo "- Unreleased" > CHANGELOG.md

          git add gradle.properties src/main/resources/META-INF/plugin.xml CHANGELOG.md
          git commit -m "Prepare next development iteration $NEXT_VERSION"
          git push -u origin "$BRANCH"
          gh pr create --title "Prepare next development iteration $NEXT_VERSION" --body "Automated PR for next iteration." --base main --head "$BRANCH"
